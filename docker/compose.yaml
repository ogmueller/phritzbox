services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        restart: unless-stopped
        ports:
            - "80:80"
        env_file:
            - ../app/.env
            - path: ../app/.env.local
              required: false
        volumes:
            - ../app:/application/app
            - ../data:/application/data
            - ../var:/application/var
        networks:
            - phritzbox

