services:
    app:
        image: ghcr.io/ogmueller/phritzbox:latest
        restart: unless-stopped
        ports:
            - "${PHRITZBOX_PORT:-80}:80"
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET:-change-me-to-a-random-string}
            APP_API_USERNAME: ${APP_API_USERNAME}
            APP_API_PASSWORD: ${APP_API_PASSWORD}
            APP_API_DOMAIN: ${APP_API_DOMAIN:-http://fritz.box}
            DATABASE_URL: "sqlite:///%kernel.project_dir%/../data/database.sqlite"
            JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
            SERVER_NAME: ${SERVER_NAME:-http://localhost}
            # Alerting: configure a real MAILER_DSN to send e-mail alerts;
            # the default discards mail (webhook alerts work without it).
            MAILER_DSN: ${MAILER_DSN:-null://null}
            APP_ALERT_FROM: ${APP_ALERT_FROM:-alerts@phritzbox.local}
        volumes:
            - phritzbox-data:/application/data
            # Persist logs only — NOT the whole var/. The cache must stay ephemeral
            # (in the image layer): persisting var/cache across image versions left
            # behind pool files owned by an older root-running image that the
            # www-data entrypoint could not delete, crash-looping on `rm -rf`.
            - phritzbox-log:/application/var/log
            - phritzbox-jwt:/application/app/config/jwt
        labels:
            cronado.savestats.enabled: "true"
            cronado.savestats.schedule: "*/30 * * * *"
            cronado.savestats.cmd: "php /application/app/bin/console cron:smart:savestats"
            # Evaluate alert rules 5 min after each collection so it sees fresh data.
            cronado.alerts.enabled: "true"
            cronado.alerts.schedule: "5,35 * * * *"
            cronado.alerts.cmd: "php /application/app/bin/console cron:smart:alerts"
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
            interval: 30s
            timeout: 3s
            # Migrations run on startup before the web server comes up. A large
            # one-off migration (e.g. building an index over millions of rows)
            # can take minutes; keep the grace window generous so a slow first
            # boot is not flagged unhealthy (which would block dependent services).
            start_period: 600s
            retries: 3
        networks:
            - phritzbox

    cronado:
        image: ghcr.io/teqneers/cronado:latest
        restart: unless-stopped
        user: root
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        depends_on:
            app:
                condition: service_healthy
        networks:
            - phritzbox

volumes:
    phritzbox-data:
    phritzbox-log:
    phritzbox-jwt:

networks:
    phritzbox:
        name: phritzbox
        external: false
