services:
    app:
        image: ghcr.io/ogmueller/phritzbox:latest
        restart: unless-stopped
        ports:
            - "${PHRITZBOX_PORT:-80}:80"
        environment:
            APP_ENV: prod
            APP_SECRET: ${APP_SECRET:-change-me-to-a-random-string}
            APP_API_USERNAME: ${APP_API_USERNAME}
            APP_API_PASSWORD: ${APP_API_PASSWORD}
            APP_API_DOMAIN: ${APP_API_DOMAIN:-http://fritz.box}
            DATABASE_URL: "sqlite:///%kernel.project_dir%/../data/database.sqlite"
            JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change-me}
            SERVER_NAME: ${SERVER_NAME:-localhost}
        volumes:
            - phritzbox-data:/application/data
            - phritzbox-var:/application/var
            - phritzbox-jwt:/application/app/config/jwt
        labels:
            cronado.savestats.enabled: "true"
            cronado.savestats.schedule: "*/30 * * * *"
            cronado.savestats.cmd: "php /application/app/bin/console cron:smart:savestats"
        healthcheck:
            test: ["CMD-SHELL", "curl -sf http://localhost/ > /dev/null || exit 1"]
            interval: 30s
            timeout: 3s
            start_period: 15s
            retries: 3
        networks:
            - phritzbox

    cronado:
        image: ghcr.io/teqneers/cronado:latest
        restart: unless-stopped
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        depends_on:
            app:
                condition: service_healthy
        networks:
            - phritzbox

volumes:
    phritzbox-data:
    phritzbox-var:
    phritzbox-jwt:

networks:
    phritzbox:
        name: phritzbox
        external: false
