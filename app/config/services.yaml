parameters:
    # Fallback used when REFRESH_TOKEN_TTL is not set in the environment (30 days).
    env(REFRESH_TOKEN_TTL): '2592000'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
